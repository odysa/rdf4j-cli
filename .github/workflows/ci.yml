name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -- --skip test_health --skip test_protocol --skip test_create --skip test_sparql --skip test_add --skip test_namespace --skip test_upload --skip test_e2e

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      rdf4j:
        image: eclipse/rdf4j-workbench:latest
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for RDF4J
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/rdf4j-server/protocol > /dev/null 2>&1; then
              echo "RDF4J is ready"
              break
            fi
            echo "Waiting for RDF4J... ($i)"
            sleep 2
          done
      - name: Run integration tests
        env:
          RDF4J_TEST_URL: http://localhost:8080/rdf4j-server
        run: cargo test -p rdf4j-cli --test integration -- --test-threads=1
